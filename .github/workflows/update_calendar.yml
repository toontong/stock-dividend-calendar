name: Update A-Stock Dividend Calendar

on:
  schedule:
    # Daily at 00:00 UTC = 08:00 Beijing time
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'config/**'
      - 'dividend.py'
      - 'requirements.txt'

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dividend calendar sync
        env:
          CALDAV_USERNAME: ${{ secrets.CALDAV_USERNAME }}
          CALDAV_PASSWORD: ${{ secrets.CALDAV_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -n "$LLM_API_KEY" ]; then
            python dividend.py -c config --caldav --analyze
          else
            python dividend.py -c config --caldav
          fi

      - name: Deploy ICS to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update dividend calendar [skip ci]'

      - name: Upload ICS artifact
        uses: actions/upload-artifact@v4
        with:
          name: dividend-ics
          path: output/dividend.ics
          retention-days: 7
